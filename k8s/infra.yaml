# PostgreSQL, Redis, and Mosquitto for a demo/staging cluster.
# For production, use managed Postgres/Redis and a hardened MQTT broker
# instead of these in-cluster single replicas.
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: volt-grid
type: Opaque
stringData:
  DB_USER: voltgrid
  DB_PASSWORD: voltgrid
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: volt-grid
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: voltgrid
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: db-credentials, key: DB_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: db-credentials, key: DB_PASSWORD } }
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: volt-grid
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: volt-grid
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: volt-grid
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: volt-grid
spec:
  replicas: 1
  selector:
    matchLabels: { app: mosquitto }
  template:
    metadata:
      labels: { app: mosquitto }
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          ports:
            - containerPort: 1883
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: volt-grid
spec:
  selector: { app: mosquitto }
  ports:
    - port: 1883
      targetPort: 1883
