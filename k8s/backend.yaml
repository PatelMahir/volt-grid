apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: volt-grid
  labels: { app: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/volt-grid-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/voltgrid
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: db-credentials, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: db-credentials, key: DB_PASSWORD } }
            - name: REDIS_HOST
              value: redis
            - name: MQTT_BROKER_URL
              value: tcp://mosquitto:1883
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: volt-grid
spec:
  selector: { app: backend }
  ports:
    - port: 8080
      targetPort: 8080
