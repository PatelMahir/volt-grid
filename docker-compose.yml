services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voltgrid
      POSTGRES_USER: voltgrid
      POSTGRES_PASSWORD: voltgrid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voltgrid"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/voltgrid
      DB_USER: voltgrid
      DB_PASSWORD: voltgrid
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  mosquitto_data:
