server:
  port: 8080

spring:
  application:
    name: volt-grid-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/voltgrid}
    username: ${DB_USER:voltgrid}
    password: ${DB_PASSWORD:voltgrid}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:volt-backend}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  # Stations publish status/meter reports to: status/<externalId>
  inbound-topic: status/+
  # Remote start/stop commands are pushed to stations on: commands/<externalId>
  command-topic-prefix: commands/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.voltgrid: INFO
