spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

# MQTT auto-config disabled in tests via the 'test' profile guard
mqtt:
  broker-url: tcp://localhost:1883
  client-id: volt-backend-test
  inbound-topic: status/+
  command-topic-prefix: commands/
